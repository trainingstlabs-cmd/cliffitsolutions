<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Service | cliffIT Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include "admin/_sidebar.html" %}
    <div class="admin-main">
        <div class="admin-topbar">
            <h2>Edit: {{ service.title }}</h2>
            <a href="{{ url_for('admin_services') }}" style="font-size:0.9rem; color:var(--gray-500);">&larr; Back to Services</a>
        </div>
        <div class="admin-content">
            <form method="post" action="{{ url_for('admin_edit_service', slug=slug) }}" class="admin-form">
                <div class="admin-card">
                    <h3>Basic Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">Service Title</label>
                            <input type="text" id="title" name="title" required value="{{ service.title }}">
                        </div>
                        <div class="form-group">
                            <label for="color">Accent Color</label>
                            <select id="color" name="color">
                                {% for c in ['blue','green','purple','orange','red','teal'] %}
                                <option value="{{ c }}" {% if service.color == c %}selected{% endif %}>{{ c|capitalize }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="tagline">Tagline</label>
                        <input type="text" id="tagline" name="tagline" value="{{ service.tagline }}" placeholder="e.g., The Right Talent. Right Now.">
                    </div>
                    <div class="form-group">
                        <label for="description">Short Description (shown on cards)</label>
                        <textarea id="description" name="description" required style="min-height:80px;">{{ service.description }}</textarea>
                    </div>
                    <div class="form-group">
                        <label for="details">Detailed Description (shown on service page)</label>
                        <textarea id="details" name="details" style="min-height:150px;" placeholder="Separate paragraphs with a blank line.">{{ service.details|join('\n\n') }}</textarea>
                        <div class="form-hint">Separate paragraphs with a blank line.</div>
                    </div>
                    <div class="form-group">
                        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                            <input type="checkbox" name="is_active" value="1" {% if service.is_active %}checked{% endif %} style="width:auto;">
                            Active (visible on website)
                        </label>
                    </div>
                </div>

                <!-- Features -->
                <div class="admin-card">
                    <h3>Features / Offerings (up to 4)</h3>
                    {% for i in range(4) %}
                    {% set feat = service.features[i] if i < service.features|length else {} %}
                    <div style="background:var(--gray-100); border-radius:10px; padding:16px; margin-bottom:12px;">
                        <div class="form-row">
                            <div class="form-group" style="margin-bottom:0;">
                                <label>Feature {{ i+1 }} Title</label>
                                <input type="text" name="feat_title_{{ i }}" value="{{ feat.get('title','') }}" placeholder="e.g., Contract Staffing">
                            </div>
                            <div class="form-group" style="margin-bottom:0;">
                                <label>Feature {{ i+1 }} Description</label>
                                <input type="text" name="feat_desc_{{ i }}" value="{{ feat.get('desc','') }}" placeholder="Brief description...">
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <div style="display:flex; gap:12px; margin-top:8px;">
                    <button type="submit" class="btn-primary btn-blue">Save Service</button>
                    <a href="{{ url_for('admin_services') }}" class="btn-primary btn-sm" style="background:var(--gray-300); color:var(--gray-700);">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
