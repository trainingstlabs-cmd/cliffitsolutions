<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | cliffIT Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="admin-login">
        <div class="admin-login-card">
            <div style="text-align:center; margin-bottom:8px;">
                <div class="logo" style="justify-content:center;">
                    <span class="cliff">cliff</span><span class="it">IT</span>
                    <span class="solutions">solutions</span>
                </div>
            </div>
            <h1>Admin Portal</h1>
            <p class="subtitle">Sign in to manage jobs and content</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for cat, msg in messages %}
            <div class="flash-msg {{ cat }}" style="margin-bottom:20px;">{{ msg }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('admin_login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="admin" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary btn-blue" style="width:100%; justify-content:center; margin-top:8px;">
                    Sign In
                </button>
            </form>

            <div style="text-align:center; margin-top:24px;">
                <a href="{{ url_for('home') }}" style="font-size:0.85rem; color:var(--gray-500);">
                    &larr; Back to Website
                </a>
            </div>
        </div>
    </div>
</body>
</html>
