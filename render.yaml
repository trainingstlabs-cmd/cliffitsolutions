services:
  - type: web
    name: cliffit-solutions
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DATABASE_PATH
        value: /var/data/cliffIT.db
    disk:
      name: cliffit-data
      mountPath: /var/data
      sizeGB: 1
